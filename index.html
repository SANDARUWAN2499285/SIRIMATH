<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirimath Liquid Glass</title>
    <style>
        /* සිංහල පෙනුමට ගැලපෙන Font එකක් */
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@800&family=Inter:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #000000, #1a0500, #00081a, #0a001a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Liquid Jelly Glass Banner --- */
        .top-banner {
            position: absolute;
            top: 30px;
            width: 80%;
            max-width: 500px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            z-index: 150;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(255,255,255,0.1);
            animation: bannerFloat 4s ease-in-out infinite alternate;
        }

        @keyframes bannerFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .jelly-text {
            font-family: 'Abhaya Libre', serif;
            font-size: 48px;
            font-weight: 800;
            color: #fff;
            display: inline-block;
            letter-spacing: 2px;
            background: linear-gradient(180deg, #ffffff 30%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
            animation: jellyWobble 3s ease-in-out infinite;
        }

        @keyframes jellyWobble {
            0%, 100% { transform: scale(1, 1); filter: hue-rotate(0deg); }
            30% { transform: scale(1.1, 0.9); }
            50% { transform: scale(0.9, 1.1) translateY(-5px); }
            80% { transform: scale(1.05, 0.95); }
        }

        /* --- Login Card & Animations --- */
        .login-card {
            width: 380px; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 40px; 
            padding: 35px;
            text-align: center; 
            z-index: 100; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .tabs { 
            display: flex; 
            justify-content: space-around; 
            margin-bottom: 25px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .tab { 
            color: rgba(255,255,255,0.5); 
            padding: 10px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 14px; 
            transition: 0.3s;
        }

        .tab.active { 
            color: #fff; 
            border-bottom: 2px solid #ff4500; 
        }

        /* Forms Animation Logic */
        .form-container {
            position: relative;
            min-height: 200px;
        }

        .form-content {
            display: none;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.4s ease;
        }

        .form-content.active-form {
            display: block;
            opacity: 1;
            transform: translateX(0);
            animation: slideIn 0.5s forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; color: white; outline: none;
        }

        .btn-main {
            width: 100%; padding: 15px; background: linear-gradient(45deg, #ff4500, #ff0000);
            color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 20px;
            transition: 0.3s;
        }
        
        .btn-main:hover { transform: scale(1.02); opacity: 0.9; }

        .social-container { display: flex; flex-direction: column; gap: 10px; }
        .btn-social {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: white; display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-size: 13px; transition: 0.3s;
        }
        .btn-social:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-social img { width: 18px; margin-right: 12px; }

        .footer {
            position: absolute; bottom: 20px; color: rgba(255, 255, 255, 0.3);
            font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
        }

        .dragon-bg {
            position: absolute; width: 600px; height: 600px; z-index: 1;
            opacity: 0.2; filter: blur(25px); animation: hueShift 10s infinite linear;
        }
        @keyframes hueShift { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }

    </style>
</head>
<body>

    <div class="top-banner">
        <div class="jelly-text">සිරිමත්</div>
    </div>

    <svg class="dragon-bg" viewBox="0 0 100 100">
        <path fill="#ff4500" d="M50,10 C30,10 10,30 10,50 C10,70 30,90 50,90 C70,90 90,70 90,50 C90,30 70,10 50,10 M50,20 C65,20 75,30 75,45 C75,55 65,65 50,75 C35,65 25,55 25,45 C25,30 35,20 50,20 Z" />
    </svg>

    <div class="login-card">
        <div class="tabs">
            <div id="tab-signin" class="tab active" onclick="switchTab('signin')">SIGN IN</div>
            <div id="tab-signup" class="tab" onclick="switchTab('signup')">SIGN UP</div>
        </div>

        <div class="form-container">
            <div id="signin-form" class="form-content active-form">
                <input type="email" placeholder="Email Address">
                <input type="password" placeholder="Password">
                <button class="btn-main">CONTINUE</button>
            </div>

            <div id="signup-form" class="form-content">
                <input type="text" placeholder="Full Name">
                <input type="email" placeholder="Email Address">
                <input type="password" placeholder="Create Password">
                <button class="btn-main">GET STARTED</button>
            </div>
        </div>

        <div style="margin-bottom: 15px; color: rgba(255,255,255,0.3); font-size: 11px;">OR CONNECT WITH</div>
        
        <div class="social-container">
            <a href="#" class="btn-social"><img src="https://img.icons8.com/color/48/000000/google-logo.png" alt="Google"> Continue with Google</a>
            <a href="#" class="btn-social"><img src="https://img.icons8.com/color/48/000000/facebook-new.png" alt="Facebook"> Continue with Facebook</a>
        </div>
    </div>

    <div class="footer">
        POWERED BY NIROSHA SANDARUWAN
    </div>

    <script>
        function switchTab(type) {
            const signInTab = document.getElementById('tab-signin');
            const signUpTab = document.getElementById('tab-signup');
            const signInForm = document.getElementById('signin-form');
            const signUpForm = document.getElementById('signup-form');

            if (type === 'signin') {
                // Update Tabs
                signInTab.classList.add('active');
                signUpTab.classList.remove('active');
                // Update Forms
                signInForm.classList.add('active-form');
                signUpForm.classList.remove('active-form');
            } else {
                // Update Tabs
                signUpTab.classList.add('active');
                signInTab.classList.remove('active');
                // Update Forms
                signUpForm.classList.add('active-form');
                signInForm.classList.remove('active-form');
            }
        }
    </script>

</body>
</html>
