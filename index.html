<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirimath Liquid Glass - Firebase Auth</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@800&family=Inter:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #000000, #1a0500, #00081a, #0a001a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .top-banner {
            position: absolute; top: 30px; width: 80%; max-width: 500px; padding: 20px;
            background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(25px);
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center; z-index: 150; animation: bannerFloat 4s ease-in-out infinite alternate;
        }

        @keyframes bannerFloat { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        .jelly-text {
            font-family: 'Abhaya Libre', serif; font-size: 48px; font-weight: 800; color: #fff;
            background: linear-gradient(180deg, #ffffff 30%, #888 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: jellyWobble 3s ease-in-out infinite;
        }

        @keyframes jellyWobble {
            0%, 100% { transform: scale(1, 1); }
            50% { transform: scale(0.9, 1.1) translateY(-5px); }
        }

        .login-card {
            width: 380px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; padding: 35px;
            text-align: center; z-index: 100; box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .tabs { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { color: rgba(255,255,255,0.5); padding: 10px; cursor: pointer; font-weight: 700; font-size: 14px; }
        .tab.active { color: #fff; border-bottom: 2px solid #ff4500; }

        .form-content { display: none; opacity: 0; transform: translateY(10px); transition: 0.4s; }
        .form-content.active-form { display: block; opacity: 1; transform: translateY(0); }

        input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; color: white; outline: none;
        }

        .btn-main {
            width: 100%; padding: 15px; background: linear-gradient(45deg, #ff4500, #ff0000);
            color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 20px;
        }

        .footer { position: absolute; bottom: 20px; color: rgba(255, 255, 255, 0.3); font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="top-banner">
        <div class="jelly-text">සිරිමත්</div>
    </div>

    <div class="login-card">
        <div class="tabs">
            <div id="t-signin" class="tab active" onclick="showForm('signin')">SIGN IN</div>
            <div id="t-signup" class="tab" onclick="showForm('signup')">SIGN UP</div>
        </div>

        <div id="f-signin" class="form-content active-form">
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-password" placeholder="Password">
            <button class="btn-main" id="btn-login">SIGN IN</button>
        </div>

        <div id="f-signup" class="form-content">
            <input type="email" id="reg-email" placeholder="Email Address">
            <input type="password" id="reg-password" placeholder="New Password">
            <button class="btn-main" id="btn-register">CREATE ACCOUNT</button>
        </div>
    </div>

    <div class="footer">POWERED BY NIROSHA SANDARUWAN</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // ඔයා ලබාදුන් Config එක
        const firebaseConfig = {
            apiKey: "AIzaSyCgZp_3OHfhO6VOOxoQyDcUU-e6F4kTcSA",
            authDomain: "sandaruwan-web.firebaseapp.com",
            databaseURL: "https://sandaruwan-web-default-rtdb.firebaseio.com",
            projectId: "sandaruwan-web",
            storageBucket: "sandaruwan-web.firebasestorage.app",
            messagingSenderId: "219324339628",
            appId: "1:219324339628:web:59e0c8debe0ddf9d921609"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Sign Up (ලියාපදිංචි වීම)
        document.getElementById('btn-register').addEventListener('click', () => {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("ගිණුම සාර්ථකව සැකසීය! ඔබ දැන් Log වී ඇත.");
                })
                .catch((error) => alert(error.message));
        });

        // Sign In (ඇතුළු වීම)
        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("සාර්ථකව ඇතුළු විය!");
                })
                .catch((error) => alert("දෝෂයකි: " + error.message));
        });
    </script>

    <script>
        function showForm(type) {
            document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active-form'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if(type === 'signin') {
                document.getElementById('f-signin').classList.add('active-form');
                document.getElementById('t-signin').classList.add('active');
            } else {
                document.getElementById('f-signup').classList.add('active-form');
                document.getElementById('t-signup').classList.add('active');
            }
        }
    </script>
</body>
</html>
