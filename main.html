<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirimath Glass Facebook Style</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@800&family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: linear-gradient(-45deg, #000, #1a0500, #00081a, #0a001a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Header --- */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo { font-family: 'Abhaya Libre'; font-size: 28px; color: #fff; }
        .header-icons { display: flex; gap: 15px; font-size: 20px; }

        /* --- Top Navigation Tabs --- */
        .top-nav {
            display: flex; justify-content: space-around;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .top-nav div { font-size: 20px; opacity: 0.6; transition: 0.3s; cursor: pointer; }
        .top-nav div.active { opacity: 1; border-bottom: 3px solid #00f2ea; padding-bottom: 5px; }

        /* --- Story Section --- */
        .stories-container {
            display: flex; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none;
        }
        .stories-container::-webkit-scrollbar { display: none; }

        .story-card {
            min-width: 110px; height: 180px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            position: relative; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: jellyWobble 4s infinite alternate;
        }

        .story-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        .story-profile {
            position: absolute; top: 10px; left: 10px;
            width: 35px; height: 35px;
            border-radius: 50%; border: 3px solid #00f2ea;
            box-shadow: 0 0 10px #00f2ea;
        }

        /* --- Floating Draggable Ring Button --- */
        #floating-contact {
            position: fixed; bottom: 100px; right: 20px;
            width: 65px; height: 65px;
            background: conic-gradient(#ff0050, #00f2ea, #ff0050);
            padding: 4px; border-radius: 50%;
            z-index: 1001; cursor: grab; touch-action: none;
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.4);
            animation: rotateRing 4s linear infinite;
        }

        @keyframes rotateRing { 100% { transform: rotate(360deg); } }

        .ring-inner {
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 25px; color: white;
            /* Rotate එක නවත්වන්න ඇතුළත icon එක වෙනම හදනවා */
            animation: reverseRotate 4s linear infinite;
        }

        @keyframes reverseRotate { 100% { transform: rotate(-360deg); } }

        /* --- Post Area --- */
        .post-input {
            margin: 15px; padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; display: flex; align-items: center; gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .post-input img { width: 40px; height: 40px; border-radius: 50%; }
        .post-input input {
            background: transparent; border: none; color: white; width: 100%; outline: none;
        }

        /* --- Jelly Menu Overlay --- */
        #social-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(25px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }

        .profile-card {
            width: 90%; max-width: 380px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px; padding: 30px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: jellyPopup 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes jellyPopup { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .social-btn {
            display: flex; align-items: center; gap: 15px;
            padding: 12px 20px; border-radius: 15px; text-decoration: none; color: white;
            margin-bottom: 10px; font-weight: bold; font-size: 14px;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .social-btn:hover { border-radius: 25px; transform: scale(1.02); }

        /* --- Navigation Animations --- */
        .nav-click { animation: tabClick 0.4s ease; }
        @keyframes tabClick { 50% { transform: scale(0.9); border-radius: 20px; } }

    </style>
</head>
<body>

    <header>
        <div class="logo">සිරිමත්</div>
        <div class="header-icons">➕ 🔍 💬</div>
    </header>

    <div class="top-nav">
        <div class="active" onclick="tabAnim(this)">🏠</div>
        <div onclick="tabAnim(this)">📺</div>
        <div onclick="tabAnim(this)">👥</div>
        <div onclick="tabAnim(this)">🔔</div>
        <div onclick="tabAnim(this)">👤</div>
    </div>

    <div class="post-input">
        <img src="1774076491049.jpg" alt="Me">
        <input type="text" placeholder="What's on your mind?">
        <span>🖼️</span>
    </div>

    <div class="stories-container">
        <div class="story-card" style="border: 2px dashed #888;">
            <div style="position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 10px;">Create Story</div>
            <div style="background: #00f2ea; width: 30px; height: 30px; border-radius: 50%; margin: 60px auto; display: flex; justify-content: center; align-items: center; color: black; font-weight: bold;">+</div>
        </div>
        <div class="story-card">
            <img src="1774076491049.jpg" class="story-img">
            <img src="1774076491049.jpg" class="story-profile">
            <div style="position: absolute; bottom: 10px; left: 10px; font-size: 10px;">Your story</div>
        </div>
        <div class="story-card"><img src="https://via.placeholder.com/110x180" class="story-img"><div style="position: absolute; bottom: 10px; left: 10px; font-size: 10px;">User 01</div></div>
        <div class="story-card"><img src="https://via.placeholder.com/110x180" class="story-img"><div style="position: absolute; bottom: 10px; left: 10px; font-size: 10px;">User 02</div></div>
    </div>

    <div id="floating-contact">
        <div class="ring-inner">🔗</div>
    </div>

    <div id="social-overlay" onclick="toggleSocials()">
        <div class="profile-card" onclick="event.stopPropagation()">
            <img src="1774076491049.jpg" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid #00f2ea; margin-bottom: 10px;">
            <h2 style="font-family: 'Abhaya Libre';">NIROSHA SANDARUWAN</h2>
            <p style="font-size: 10px; opacity: 0.6; margin-bottom: 20px;">Connect on Social Media</p>
            
            <div style="display: flex; flex-direction: column;">
                <a href="https://wa.me/94741570339" class="social-btn" style="background: #25D366;">WhatsApp</a>
                <a href="https://youtube.com/@nirosha_sandaruwan" class="social-btn" style="background: #FF0000;">YouTube</a>
                <a href="tel:0741570339" class="social-btn" style="background: #444;">Call Me</a>
            </div>
            <p style="margin-top: 15px; font-size: 11px; color: #888;">Back to Feed</p>
        </div>
    </div>

    <script>
        const ring = document.getElementById('floating-contact');
        let isDragging = false;
        let startX, startY;

        // Tab Animation
        function tabAnim(el) {
            document.querySelectorAll('.top-nav div').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            el.classList.add('nav-click');
            setTimeout(() => el.classList.remove('nav-click'), 400);
        }

        // Draggable Logic
        ring.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX - ring.offsetLeft;
            startY = e.touches[0].clientY - ring.offsetTop;
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            ring.style.left = (e.touches[0].clientX - startX) + 'px';
            ring.style.top = (e.touches[0].clientY - startY) + 'px';
            ring.style.right = 'auto'; ring.style.bottom = 'auto';
        });

        document.addEventListener('touchend', () => { isDragging = false; });

        ring.addEventListener('click', () => { if(!isDragging) toggleSocials(); });

        function toggleSocials() {
            const overlay = document.getElementById('social-overlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        }
    </script>
</body>
</html>
