<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirimath Glass Pro - AI & Tools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@800&family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            /* විනිවිද පෙනෙන Glass Effect එකට යටින් තදින් වර්ණ වෙනස් වන පසුබිම */
            background: linear-gradient(-45deg, #000000, #1a0033, #001a33, #330000, #00331a);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite; /* වේගය වැඩි කර ඇත */
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Glass Transparency Boost --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03); /* විනිවිද පෙනෙන බව වැඩි කර ඇත */
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(30px);
            padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- Dynamic User Info (Home Page) --- */
        .user-info-bar {
            padding: 15px; margin: 10px;
            border-radius: 20px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .user-name { font-weight: 700; font-size: 18px; color: #1877F2; }
        .user-email { font-size: 12px; opacity: 0.6; font-family: 'Fira Code', monospace; }

        /* --- AI Chat - Enhanced Customization --- */
        #ai-chat-overlay {
            position: fixed; inset: 0; z-index: 4000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(40px);
            display: none; flex-direction: column;
            padding: 20px;
        }
        .jelly-robo-container {
            width: 150px; height: 150px; margin: 20px auto;
            background: radial-gradient(circle, rgba(0,242,234,0.2) 0%, transparent 70%);
            display: flex; justify-content: center; align-items: center;
        }
        .jelly-robo {
            font-size: 70px;
            animation: roboJelly 2s ease-in-out infinite alternate;
            text-shadow: 0 0 20px #00f2ea;
        }
        @keyframes roboJelly {
            0% { transform: scale(1) translateY(0); filter: hue-rotate(0deg); }
            100% { transform: scale(1.1) translateY(-10px); filter: hue-rotate(45deg); }
        }

        /* --- More Tools: Cyber Interface --- */
        #tools-overlay {
            position: fixed; inset: 0; z-index: 5000;
            background: #000; display: none; flex-direction: column;
            font-family: 'Fira Code', monospace; padding: 20px;
            color: #0f0; overflow: hidden;
        }
        .cyber-loader {
            border-left: 2px solid #0f0; padding-left: 10px;
            margin-top: 20px; font-size: 13px; line-height: 1.6;
        }
        .typing-text::after { content: "_"; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- Grid Buttons --- */
        .collage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .collage-card {
            padding: 25px; border-radius: 20px; text-align: center;
            cursor: pointer; transition: 0.3s;
        }
        .collage-card:active { transform: scale(0.9); }

    </style>
</head>
<body>

    <header>
        <div style="font-family: 'Abhaya Libre'; font-size: 26px;">සිරිමත්</div>
        <div style="display: flex; gap: 15px;"><i class="fas fa-search"></i> <i class="fas fa-comment-dots"></i></div>
    </header>

    <div id="home" class="content-section active">
        <div class="user-info-bar glass-panel">
            <span class="user-name" id="display-name">Guest User</span>
            <span class="user-email" id="display-email">user@example.com</span>
        </div>

        <div class="collage-grid">
            <div class="collage-card glass-panel" style="color: #00f2ea;" onclick="openAI()">
                <i class="fas fa-robot fa-2x"></i><br><br>
                <b>Sirimath AI</b>
            </div>
            <div class="collage-card glass-panel" style="color: #ffcc00;">
                <i class="fas fa-store fa-2x"></i><br><br>
                <b>Market</b>
            </div>
            <div class="collage-card glass-panel" style="grid-column: span 2; color: #ff0055;" onclick="openTools()">
                <i class="fas fa-terminal fa-2x"></i><br><br>
                <b>MORE TOOLS</b>
            </div>
        </div>
    </div>

    <div id="ai-chat-overlay">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="color: #00f2ea;">සිරිමත් AI Chat</h2>
            <i class="fas fa-times fa-2x" onclick="closeAI()"></i>
        </div>
        <div class="jelly-robo-container">
            <div class="jelly-robo">🤖</div>
        </div>
        <div id="chat-box" style="flex: 1; overflow-y: auto; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px;">
            <p style="color: #00f2ea;">System: Ready to assist you...</p>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <input type="text" id="ai-input" style="flex: 1; background: rgba(255,255,255,0.1); border: 1px solid #00f2ea; border-radius: 30px; padding: 12px; color: white; outline: none;">
            <button onclick="sendAI()" style="background: #00f2ea; border: none; padding: 10px 20px; border-radius: 50%; color: black;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="tools-overlay">
        <div style="display: flex; justify-content: space-between;">
            <span>[ SYSTEM TERMINAL ]</span>
            <span onclick="closeTools()" style="color: #f00; cursor: pointer;">[ EXIT ]</span>
        </div>
        <div class="cyber-loader" id="cyber-logs">
            <p class="typing-text">> Initializing Sirimath Cyber Core...</p>
        </div>
    </div>

    <script>
        // User Detection Simulation
        document.addEventListener('DOMContentLoaded', () => {
            const email = "user_" + Math.floor(Math.random()*1000) + "@gmail.com";
            document.getElementById('display-name').innerText = "Logged User Profile";
            document.getElementById('display-email').innerText = email;
        });

        function openAI() { document.getElementById('ai-chat-overlay').style.display = 'flex'; }
        function closeAI() { document.getElementById('ai-chat-overlay').style.display = 'none'; }

        function openTools() {
            document.getElementById('tools-overlay').style.display = 'flex';
            const logs = document.getElementById('cyber-logs');
            const messages = [
                "Connecting to secure node...",
                "Bypassing firewall protocols...",
                "Encryption keys generated: 2048-bit",
                "Accessing cloud database...",
                "Loading Sirimath Security Tools...",
                "Status: SYSTEM ONLINE"
            ];
            let i = 0;
            const interval = setInterval(() => {
                if(i < messages.length) {
                    const p = document.createElement('p');
                    p.innerText = "> " + messages[i];
                    logs.appendChild(p);
                    i++;
                } else { clearInterval(interval); }
            }, 800);
        }

        function closeTools() { document.getElementById('tools-overlay').style.display = 'none'; document.getElementById('cyber-logs').innerHTML = ''; }

        function sendAI() {
            const input = document.getElementById('ai-input');
            const box = document.getElementById('chat-box');
            if(!input.value) return;
            box.innerHTML += `<p style="text-align: right; margin-bottom: 10px;">${input.value}</p>`;
            setTimeout(() => {
                box.innerHTML += `<p style="color: #00f2ea; margin-bottom: 10px;"><b>AI:</b> Processing request in glass core...</p>`;
                box.scrollTop = box.scrollHeight;
            }, 500);
            input.value = "";
        }
    </script>
</body>
</html>
